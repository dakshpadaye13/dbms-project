{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="auth-card animate-fadeInUp">
    <!-- Logo -->
    <div class="auth-logo">
      <div class="logo-big">
        <span style="background:var(--grad-primary);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🎓 DBMS Project DB</span>
      </div>
    </div>

    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Enter your Student ID or Name to log in</p>

    {% if error %}
    <div class="flash flash-error" style="margin-bottom:20px;">{{ error }}</div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}" id="loginForm">
      <div class="form-group">
        <label class="form-label" for="email">Student ID or Name</label>
        <input type="text" id="email" name="email" class="form-input"
               placeholder="e.g., Student1 or 1" value="{{ email or '' }}" required autofocus>
      </div>

      <button type="submit" class="btn btn-primary" style="width:100%;padding:15px;font-size:1rem;margin-top:20px;">
        Sign In <span>→</span>
      </button>
    </form>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:16px;margin:24px 0">
      <div style="flex:1;height:1px;background:var(--border)"></div>
      <span style="color:var(--text-muted);font-size:0.82rem">OR</span>
      <div style="flex:1;height:1px;background:var(--border)"></div>
    </div>

    <!-- Admin hint -->
    <div style="background:rgba(124,58,237,0.08);border:1px solid var(--border-glow);border-radius:var(--radius-md);padding:12px 16px;font-size:0.83rem;color:var(--text-muted);text-align:center">
      🔐 To view all database tables, log in as <strong style="color:var(--purple-light)">admin</strong>
    </div>

  </div>
</div>
{% endblock %}

{% block show_footer %}{% endblock %}
